name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...

  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: polypent
          POSTGRES_PASSWORD: devpw
          POSTGRES_DB: polypent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polypent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POLYPENT_TEST_DATABASE_URL: "postgres://polypent:devpw@127.0.0.1:5432/polypent_test?sslmode=disable"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo build (collectors/rust)
        run: cargo build --release --manifest-path collectors/rust/Cargo.toml
      - name: go test (race)
        run: go test -race -count=1 ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=5m
